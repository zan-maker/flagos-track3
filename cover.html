<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  @page { size: 794px 1123px; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 794px; height: 1123px; overflow: hidden; font-family: 'Inter', sans-serif; background: #f1f0ed; }

  .cover {
    position: relative;
    width: 794px;
    height: 1123px;
    background: #ffffff;
  }

  .bg-accent {
    position: absolute;
    top: 0; right: 0;
    width: 420px; height: 100%;
    background: linear-gradient(160deg, #b4273e 0%, #d44a5e 40%, #e8a0ab 100%);
    clip-path: polygon(18% 0, 100% 0, 100% 100%, 0% 100%);
    opacity: 0.08;
  }

  .geo-line-v {
    position: absolute;
    left: 95px; top: 80px;
    width: 2px; height: 380px;
    background: #b4273e;
    opacity: 0.25;
  }
  .geo-line-h {
    position: absolute;
    left: 95px; top: 460px;
    width: 180px; height: 2px;
    background: #b4273e;
    opacity: 0.25;
  }
  .geo-circle {
    position: absolute;
    right: 100px; bottom: 160px;
    width: 120px; height: 120px;
    border: 1.5px solid #b4273e;
    border-radius: 50%;
    opacity: 0.15;
  }
  .geo-dot {
    position: absolute;
    right: 155px; bottom: 215px;
    width: 8px; height: 8px;
    background: #b4273e;
    border-radius: 50%;
    opacity: 0.3;
  }

  .kicker {
    position: absolute;
    left: 95px; top: 140px;
    font-size: 11pt;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #b4273e;
    opacity: 0.75;
  }

  .title {
    position: absolute;
    left: 95px; top: 190px;
    width: 520px;
    font-size: 38pt;
    font-weight: 800;
    line-height: 1.15;
    color: #1f1e1c;
  }
  .title .line2 { color: #b4273e; }

  .subtitle {
    position: absolute;
    left: 95px; top: 340px;
    width: 480px;
    font-size: 14pt;
    font-weight: 300;
    line-height: 1.6;
    color: #817e75;
  }

  .meta-block {
    position: absolute;
    left: 95px; bottom: 120px;
    font-size: 10pt;
    color: #817e75;
    line-height: 1.8;
  }
  .meta-block .label { font-weight: 600; color: #1f1e1c; }

  .badge {
    position: absolute;
    right: 60px; top: 100px;
    padding: 8px 18px;
    background: #b4273e;
    color: white;
    font-size: 9pt;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-radius: 3px;
  }
</style>
</head>
<body>
<div class="cover">
  <div class="bg-accent"></div>
  <div class="geo-line-v"></div>
  <div class="geo-line-h"></div>
  <div class="geo-circle"></div>
  <div class="geo-dot"></div>

  <div class="badge">Technical Report</div>
  <div class="kicker">FlagOS Open Computing Hackathon</div>
  <div class="title">
    AnnotateX<br>
    <span class="line2">Technical Report</span>
  </div>
  <div class="subtitle">
    LLM Automatic Data Annotation<br>in Long-Context Scenarios
  </div>

  <div class="meta-block">
    <span class="label">Track:</span> Track 3 - LLM Automatic Data Annotation<br>
    <span class="label">Model:</span> Qwen3-4B with ICL<br>
    <span class="label">Team:</span> zan-maker<br>
    <span class="label">Date:</span> April 2026
  </div>
</div>
</body>
</html>
